kind = "web"
previewPath = "/"
title = "Cristina Lucero - Creator Site"
version = "1.0.0"
id = "artifacts/cristina-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18825

[services.development]
run = "pnpm --filter @workspace/cristina-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cristina-site", "run", "build" ]
publicDir = "artifacts/cristina-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18825"
BASE_PATH = "/"
