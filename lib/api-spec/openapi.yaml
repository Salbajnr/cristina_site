openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Cristina Lucero creator site
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: content
    description: Content items
  - name: categories
    description: Content categories
  - name: purchases
    description: Purchase operations
  - name: profile
    description: Creator profile
  - name: creator
    description: Creator admin operations
  - name: inquiries
    description: Visitor enquiries
  - name: posts
    description: Free public posts and comments
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get creator profile
      responses:
        "200":
          description: Creator profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [creator]
      summary: Update creator profile (creator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /content:
    get:
      operationId: listContent
      tags: [content]
      summary: List all content items
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [photo, video, bundle]
      responses:
        "200":
          description: List of content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentItem"
    post:
      operationId: createContent
      tags: [creator]
      summary: Create a new content item (creator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentBody"
      responses:
        "201":
          description: Created content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"

  /content/featured:
    get:
      operationId: getFeaturedContent
      tags: [content]
      summary: Get featured content items
      responses:
        "200":
          description: Featured content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentItem"

  /content/{id}:
    get:
      operationId: getContent
      tags: [content]
      summary: Get a single content item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
    put:
      operationId: updateContent
      tags: [creator]
      summary: Update a content item (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentBody"
      responses:
        "200":
          description: Updated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentItem"
        "404":
          description: Not found
    delete:
      operationId: deleteContent
      tags: [creator]
      summary: Delete a content item (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /stats:
    get:
      operationId: getSiteStats
      tags: [profile]
      summary: Get site statistics
      responses:
        "200":
          description: Site stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

  /purchases:
    get:
      operationId: listPurchases
      tags: [creator]
      summary: List all purchases (creator only)
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a new purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseBody"
      responses:
        "201":
          description: Purchase created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
        "400":
          description: Invalid request

  /creator/verify:
    post:
      operationId: verifyCreator
      tags: [creator]
      summary: Verify creator password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCreatorBody"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCreatorResult"
        "401":
          description: Unauthorized

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all free posts
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [posts]
      summary: List comments for a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [posts]
      summary: Add a comment to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /creator/posts:
    post:
      operationId: createPost
      tags: [creator]
      summary: Create a new free post (creator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /creator/posts/{id}:
    delete:
      operationId: deletePost
      tags: [creator]
      summary: Delete a post (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /inquiries:
    post:
      operationId: createInquiry
      tags: [inquiries]
      summary: Submit a visitor enquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryBody"
      responses:
        "201":
          description: Enquiry submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
        "400":
          description: Invalid request

  /creator/inquiries:
    get:
      operationId: listInquiries
      tags: [creator]
      summary: List all visitor enquiries (creator only)
      responses:
        "200":
          description: List of enquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inquiry"

  /creator/inquiries/{id}/read:
    put:
      operationId: markInquiryRead
      tags: [creator]
      summary: Mark an enquiry as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated enquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Profile:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        coverUrl:
          type: string
        location:
          type: string
        subscriberCount:
          type: integer
        totalPhotos:
          type: integer
        totalVideos:
          type: integer
        joinedDate:
          type: string
      required: [id, displayName, username, bio, subscriberCount, totalPhotos, totalVideos, joinedDate]

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        coverUrl:
          type: string
        location:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        itemCount:
          type: integer
      required: [id, name, slug, itemCount]

    ContentItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [photo, video, bundle]
        price:
          type: number
        previewUrl:
          type: string
        isLocked:
          type: boolean
        isFeatured:
          type: boolean
        categoryId:
          type: integer
        categoryName:
          type: string
        likeCount:
          type: integer
        commentCount:
          type: integer
        createdAt:
          type: string
        tags:
          type: array
          items:
            type: string
      required: [id, title, type, price, previewUrl, isLocked, isFeatured, likeCount, commentCount, createdAt]

    CreateContentBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [photo, video, bundle]
        price:
          type: number
        previewUrl:
          type: string
        isLocked:
          type: boolean
        isFeatured:
          type: boolean
        categoryId:
          type: integer
        tags:
          type: array
          items:
            type: string
      required: [title, type, price, previewUrl, isLocked, isFeatured]

    UpdateContentBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [photo, video, bundle]
        price:
          type: number
        previewUrl:
          type: string
        isLocked:
          type: boolean
        isFeatured:
          type: boolean
        categoryId:
          type: integer
        tags:
          type: array
          items:
            type: string

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
      required: [success, id]

    SiteStats:
      type: object
      properties:
        totalContent:
          type: integer
        totalPhotos:
          type: integer
        totalVideos:
          type: integer
        totalBundles:
          type: integer
        subscriberCount:
          type: integer
      required: [totalContent, totalPhotos, totalVideos, totalBundles, subscriberCount]

    CreatePurchaseBody:
      type: object
      properties:
        contentId:
          type: integer
        customerEmail:
          type: string
        customerName:
          type: string
        paymentMethod:
          type: string
      required: [contentId, customerEmail, customerName, paymentMethod]

    Purchase:
      type: object
      properties:
        id:
          type: integer
        contentId:
          type: integer
        contentTitle:
          type: string
        customerEmail:
          type: string
        amount:
          type: number
        status:
          type: string
        createdAt:
          type: string
      required: [id, contentId, contentTitle, customerEmail, amount, status, createdAt]

    VerifyCreatorBody:
      type: object
      properties:
        password:
          type: string
      required: [password]

    VerifyCreatorResult:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required: [success, token]

    CreateInquiryBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        message:
          type: string
      required: [name, email, message]

    Inquiry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, message, isRead, createdAt]

    Post:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [text, photo, video]
        title:
          type: string
        body:
          type: string
        mediaUrl:
          type: string
        createdAt:
          type: string
      required: [id, type, body, createdAt]

    CreatePostBody:
      type: object
      properties:
        type:
          type: string
          enum: [text, photo, video]
        title:
          type: string
        body:
          type: string
        mediaUrl:
          type: string
      required: [body]

    Comment:
      type: object
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorName:
          type: string
        body:
          type: string
        createdAt:
          type: string
      required: [id, postId, authorName, body, createdAt]

    CreateCommentBody:
      type: object
      properties:
        authorName:
          type: string
        body:
          type: string
      required: [authorName, body]
